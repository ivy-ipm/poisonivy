<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GrabVR Level Downloader</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
        text-align: center;
        padding: 40px;
    }

    input {
        width: 90%;
        max-width: 500px;
        padding: 12px;
        border-radius: 10px;
        border: none;
        margin-bottom: 20px;
        font-size: 16px;
    }

    button {
        padding: 12px 20px;
        border: none;
        border-radius: 10px;
        background: #22c55e;
        color: white;
        font-size: 16px;
        cursor: pointer;
    }

    #status {
        margin-top: 20px;
    }
</style>
</head>

<body>

<h1>GrabVR Level Downloader</h1>

<input id="levelInput" placeholder="Paste GrabVR level link here">
<br>
<button onclick="downloadLevel()">Download</button>

<div id="status"></div>

<script>
async function downloadLevel() {
    const input = document.getElementById("levelInput").value.trim();
    const status = document.getElementById("status");

    if (!input.includes("level=")) {
        status.innerText = "Invalid link!";
        return;
    }

    try {
        // Extract level data
        let levelPart = input.split("level=")[1];
        let [levelId, timestamp] = levelPart.split(":");

        if (!levelId || !timestamp) throw "Bad format";

        // Build API URL
        let apiUrl = `https://api.slin.dev/grab/v1/download/${levelId}/${timestamp}/1`;

        status.innerText = "Downloading...";

        // Fetch file
        const response = await fetch(apiUrl);
        if (!response.ok) throw "Download failed";

        const blob = await response.blob();

        // Create download
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement("a");

        // 👇 filename = timestamp.level
        a.href = url;
        a.download = `${timestamp}.level`;

        document.body.appendChild(a);
        a.click();

        a.remove();
        window.URL.revokeObjectURL(url);

        status.innerText = "Downloaded successfully!";

    } catch (e) {
        status.innerText = "Error downloading level!";
    }
}
</script>

</body>
</html>
